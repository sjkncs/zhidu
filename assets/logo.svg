<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1117"/>
      <stop offset="100%" style="stop-color:#1F3A5F"/>
    </linearGradient>
    <linearGradient id="icon-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1F3A5F"/>
      <stop offset="100%" style="stop-color:#2E75B6"/>
    </linearGradient>
    <linearGradient id="bridge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2E75B6;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#4A90D0"/>
      <stop offset="100%" style="stop-color:#2E75B6;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Main icon: rounded square with "知" -->
  <rect x="156" y="100" width="200" height="200" rx="40" fill="url(#icon-bg)" filter="url(#glow)"/>
  <text x="256" y="200" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif"
        font-size="120" font-weight="700" fill="white" text-anchor="middle"
        dominant-baseline="central">知</text>

  <!-- Bridge line (渡 = crossing) -->
  <path d="M100 350 Q 256 310 412 350" stroke="url(#bridge)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Small dots on the bridge -->
  <circle cx="160" cy="342" r="3" fill="#4A90D0" opacity="0.6"/>
  <circle cx="256" cy="328" r="4" fill="#4A90D0" opacity="0.8"/>
  <circle cx="352" cy="342" r="3" fill="#4A90D0" opacity="0.6"/>

  <!-- Brand name -->
  <text x="256" y="400" font-family="'Inter', 'Noto Sans SC', 'PingFang SC', sans-serif"
        font-size="48" font-weight="700" fill="white" text-anchor="middle"
        letter-spacing="12">知渡</text>

  <!-- English subtitle -->
  <text x="256" y="440" font-family="'Inter', sans-serif"
        font-size="18" font-weight="400" fill="#9CA3AF" text-anchor="middle"
        letter-spacing="8">ZHIDU</text>

  <!-- Decorative dots (knowledge network) -->
  <g opacity="0.15">
    <circle cx="80" cy="80" r="2" fill="#4A90D0"/>
    <circle cx="432" cy="80" r="2" fill="#4A90D0"/>
    <circle cx="80" cy="432" r="2" fill="#4A90D0"/>
    <circle cx="432" cy="432" r="2" fill="#4A90D0"/>
    <circle cx="60" cy="200" r="1.5" fill="#4A90D0"/>
    <circle cx="452" cy="200" r="1.5" fill="#4A90D0"/>
    <circle cx="60" cy="300" r="1.5" fill="#4A90D0"/>
    <circle cx="452" cy="300" r="1.5" fill="#4A90D0"/>
  </g>
</svg>
