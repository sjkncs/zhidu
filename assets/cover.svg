<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="cover-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080A10"/>
      <stop offset="40%" style="stop-color:#0F1117"/>
      <stop offset="100%" style="stop-color:#1A2744"/>
    </linearGradient>
    <linearGradient id="cover-icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1F3A5F"/>
      <stop offset="100%" style="stop-color:#2E75B6"/>
    </linearGradient>
    <linearGradient id="line-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2E75B6;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#2E75B6;stop-opacity:0.6"/>
      <stop offset="70%" style="stop-color:#4A90D0;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#4A90D0;stop-opacity:0"/>
    </linearGradient>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="text-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#cover-bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.02" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Knowledge network nodes and connections (center area) -->
  <g opacity="0.12" filter="url(#soft-glow)">
    <!-- Connection lines -->
    <line x1="480" y1="280" x2="600" y2="320" stroke="#2E75B6" stroke-width="1"/>
    <line x1="600" y1="320" x2="720" y2="290" stroke="#2E75B6" stroke-width="1"/>
    <line x1="720" y1="290" x2="800" y2="350" stroke="#2E75B6" stroke-width="1"/>
    <line x1="600" y1="320" x2="650" y2="400" stroke="#2E75B6" stroke-width="1"/>
    <line x1="650" y1="400" x2="750" y2="380" stroke="#2E75B6" stroke-width="1"/>
    <line x1="750" y1="380" x2="800" y2="350" stroke="#2E75B6" stroke-width="1"/>
    <line x1="480" y1="280" x2="520" y2="380" stroke="#2E75B6" stroke-width="0.5"/>
    <line x1="520" y1="380" x2="650" y2="400" stroke="#2E75B6" stroke-width="0.5"/>
    <!-- Nodes -->
    <circle cx="480" cy="280" r="4" fill="#4A90D0"/>
    <circle cx="600" cy="320" r="6" fill="#2E75B6"/>
    <circle cx="720" cy="290" r="4" fill="#4A90D0"/>
    <circle cx="800" cy="350" r="5" fill="#2E75B6"/>
    <circle cx="650" cy="400" r="4" fill="#4A90D0"/>
    <circle cx="750" cy="380" r="3" fill="#4A90D0"/>
    <circle cx="520" cy="380" r="3" fill="#4A90D0"/>
  </g>

  <!-- Left: Logo icon -->
  <rect x="80" y="200" width="180" height="180" rx="36" fill="url(#cover-icon)" filter="url(#soft-glow)"/>
  <text x="170" y="330" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif"
        font-size="112" font-weight="700" fill="white" text-anchor="middle"
        dominant-baseline="central" dy="-10">知</text>

  <!-- Bridge line under icon -->
  <path d="M80 420 Q 170 390 260 420" stroke="url(#line-glow)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="120" cy="414" r="2.5" fill="#4A90D0" opacity="0.5"/>
  <circle cx="170" cy="404" r="3" fill="#4A90D0" opacity="0.7"/>
  <circle cx="220" cy="414" r="2.5" fill="#4A90D0" opacity="0.5"/>

  <!-- Center-Right: Brand text -->
  <text x="340" y="290" font-family="'Inter', 'Noto Sans SC', 'PingFang SC', sans-serif"
        font-size="72" font-weight="800" fill="white" letter-spacing="16" filter="url(#text-glow)">知渡</text>

  <!-- Tagline -->
  <text x="340" y="340" font-family="'Inter', 'Noto Sans SC', 'PingFang SC', sans-serif"
        font-size="22" font-weight="400" fill="#9CA3AF" letter-spacing="2">AI 志愿填报与大学生成长平台</text>

  <!-- Feature pills -->
  <g transform="translate(340, 380)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="120" height="32" rx="16" fill="#1F3A5F" opacity="0.6"/>
    <text x="60" y="21" font-family="'Noto Sans SC', sans-serif" font-size="13" fill="#4A90D0" text-anchor="middle" font-weight="500">智能志愿</text>
    <!-- Pill 2 -->
    <rect x="132" y="0" width="120" height="32" rx="16" fill="#1F3A5F" opacity="0.6"/>
    <text x="192" y="21" font-family="'Noto Sans SC', sans-serif" font-size="13" fill="#4A90D0" text-anchor="middle" font-weight="500">学科评估</text>
    <!-- Pill 3 -->
    <rect x="264" y="0" width="120" height="32" rx="16" fill="#1F3A5F" opacity="0.6"/>
    <text x="324" y="21" font-family="'Noto Sans SC', sans-serif" font-size="13" fill="#4A90D0" text-anchor="middle" font-weight="500">生涯规划</text>
    <!-- Pill 4 -->
    <rect x="396" y="0" width="120" height="32" rx="16" fill="#1F3A5F" opacity="0.6"/>
    <text x="456" y="21" font-family="'Noto Sans SC', sans-serif" font-size="13" fill="#4A90D0" text-anchor="middle" font-weight="500">知识库 RAG</text>
  </g>

  <!-- Tech stack badges (bottom right) -->
  <g transform="translate(850, 520)" opacity="0.4">
    <text x="0" y="0" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="12" fill="#6B7280">Next.js 16 · React 19 · Supabase · TypeScript</text>
    <text x="0" y="22" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="12" fill="#6B7280">pnpm monorepo · Tailwind CSS v4 · pgvector</text>
  </g>

  <!-- Decorative corner elements -->
  <g opacity="0.06">
    <rect x="40" y="40" width="60" height="1" fill="#4A90D0"/>
    <rect x="40" y="40" width="1" height="60" fill="#4A90D0"/>
    <rect x="1180" y="40" width="60" height="1" fill="#4A90D0"/>
    <rect x="1239" y="40" width="1" height="60" fill="#4A90D0"/>
    <rect x="40" y="599" width="60" height="1" fill="#4A90D0"/>
    <rect x="40" y="540" width="1" height="60" fill="#4A90D0"/>
    <rect x="1180" y="599" width="60" height="1" fill="#4A90D0"/>
    <rect x="1239" y="540" width="1" height="60" fill="#4A90D0"/>
  </g>

  <!-- Version badge -->
  <g transform="translate(1120, 50)">
    <rect x="0" y="0" width="100" height="28" rx="14" fill="#1F3A5F" opacity="0.4"/>
    <text x="50" y="19" font-family="'JetBrains Mono', monospace" font-size="11" fill="#4A90D0" text-anchor="middle" font-weight="500">v0.2.0</text>
  </g>
</svg>
